<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>todo.md</title>
<style>
  :root{
    --bg:#0f1419; --bg2:#161c24; --card:#1b232e; --card2:#202a37;
    --line:#2b3645; --ink:#e7edf3; --muted:#8a98a8; --dim:#5b6776;
    --amber:#f2b134; --blue:#4aa3ff; --red:#ff5d5d; --green:#3fd07e; --purple:#b388ff;
    --shadow:0 6px 22px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #1c2733 0%, var(--bg) 55%) fixed;
    color:var(--ink); font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; padding:22px 26px 60px;
  }
  header{display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding-bottom:16px; margin-bottom:20px; border-bottom:1px solid var(--line)}
  .badge{font:600 14px/1 ui-monospace,SFMono-Regular,Menlo,monospace; color:#0f1419;
    background:linear-gradient(135deg,var(--amber),#ffd277); padding:9px 12px; border-radius:9px;
    box-shadow:var(--shadow); letter-spacing:.3px}
  .date{font-size:30px; font-weight:700; letter-spacing:.2px}
  .worksite{color:var(--muted); font-size:15px; max-width:48ch}
  .worksite b{color:var(--ink)}
  .clock{margin-left:auto; text-align:right}
  .clock .t{font:700 30px/1 ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--ink)}
  .clock .d{color:var(--dim); font-size:13px; margin-top:4px}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:18px; align-items:start}
  .card{background:linear-gradient(180deg,var(--card),var(--bg2)); border:1px solid var(--line);
    border-left:4px solid var(--accent,var(--blue)); border-radius:14px; padding:16px 18px 14px;
    box-shadow:var(--shadow)}
  .card h2{margin:0 0 12px; font-size:13px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent,var(--blue)); display:flex; align-items:center; gap:10px}
  .count{margin-left:auto; font:600 12px/1 ui-monospace,monospace; color:var(--dim);
    background:#0d1218; border:1px solid var(--line); padding:4px 8px; border-radius:20px}
  .card h3.sub{margin:14px 0 6px; font-size:12px; letter-spacing:.06em; color:var(--muted);
    text-transform:uppercase; font-weight:700}
  .card h3.sub:first-child{margin-top:0}
  .card p{margin:6px 0; color:var(--ink)}
  .card p.note{color:var(--muted); font-size:13.5px; border-left:2px solid var(--line); padding-left:10px}
  .item{display:flex; gap:11px; align-items:flex-start; padding:8px 8px; margin:2px -8px;
    border-radius:9px; cursor:pointer; transition:background .12s}
  .item:hover{background:rgba(255,255,255,.035)}
  .item input{appearance:none; -webkit-appearance:none; flex:0 0 auto; width:20px; height:20px;
    margin:1px 0 0; border:2px solid var(--dim); border-radius:6px; cursor:pointer;
    position:relative; transition:all .15s}
  .item input:hover{border-color:var(--accent,var(--blue))}
  .item input:checked{background:var(--accent,var(--green)); border-color:var(--accent,var(--green))}
  .item input:checked::after{content:""; position:absolute; left:5px; top:1px; width:5px; height:10px;
    border:solid #0f1419; border-width:0 2.5px 2.5px 0; transform:rotate(43deg)}
  .item .txt{flex:1; transition:color .15s,opacity .15s}
  .item.done .txt{color:var(--dim); opacity:.65}
  .item.done .txt strong{color:var(--dim)}
  .txt strong{color:#fff}
  .txt code{background:#0d1218; border:1px solid var(--line); padding:1px 6px; border-radius:5px;
    font:13px ui-monospace,monospace; color:var(--amber)}
  .txt del{color:var(--dim)}
  table{width:100%; border-collapse:collapse; margin:4px 0; font-size:14.5px}
  th,td{text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:top}
  th{color:var(--muted); font-size:11px; letter-spacing:.08em; text-transform:uppercase}
  tbody tr:hover{background:rgba(255,255,255,.03)}
  td strong{color:#fff}
  .meqbar{margin-top:20px; display:flex; align-items:center; gap:22px; flex-wrap:wrap;
    background:linear-gradient(180deg,#241c34,#1a1626); border:1px solid var(--line);
    border-left:4px solid var(--purple); border-radius:14px; padding:14px 22px; box-shadow:var(--shadow)}
  .meqbar .meqtitle{font:700 13px/1 ui-monospace,monospace; letter-spacing:.16em; color:var(--purple)}
  .meqbar .cd{display:flex; align-items:baseline; gap:9px}
  .meqbar .cd .n{font:800 30px/1 ui-monospace,SFMono-Regular,Menlo,monospace; color:#fff}
  .meqbar .cd .u{color:var(--muted); font-size:14px}
  .meqbar .chips{display:flex; gap:8px; flex-wrap:wrap}
  .meqbar .chip{font-size:13px; color:var(--ink); background:#0d1218; border:1px solid var(--line);
    padding:5px 11px; border-radius:20px; white-space:nowrap}
  .meqbar .chip strong{color:var(--purple)}
  .meqbar .thisweek{margin-left:auto; font-size:14px; color:#0f1419;
    background:linear-gradient(135deg,var(--amber),#ffd277); padding:8px 14px; border-radius:10px}
  .meqbar .thisweek b{font-weight:700}
  footer{margin-top:26px; display:flex; gap:16px; align-items:center; color:var(--dim); font-size:12.5px}
  footer button{background:var(--card2); color:var(--muted); border:1px solid var(--line);
    padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12.5px}
  footer button:hover{color:var(--ink); border-color:var(--dim)}
  .progress{flex:1; height:6px; background:#0d1218; border-radius:6px; overflow:hidden; max-width:320px}
  .progress > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--green),#7ff0ad); transition:width .3s}
  /* ---- passphrase gate (secure build only) ---- */
  .gate{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(900px 500px at 50% 20%, #1c2733, var(--bg)); z-index:50}
  .gatebox{display:flex; flex-direction:column; gap:12px; width:min(90vw,320px);
    background:var(--card); border:1px solid var(--line); border-radius:16px; padding:26px; box-shadow:var(--shadow)}
  .gatebox .glock{font-size:32px; text-align:center}
  .gatebox .gtitle{text-align:center; font:600 16px/1 ui-monospace,monospace; color:var(--amber); letter-spacing:.4px}
  .gatebox input[type=password]{padding:12px 14px; font-size:16px; border-radius:10px;
    border:1px solid var(--line); background:#0d1218; color:var(--ink)}
  .gatebox button{padding:12px; font-size:15px; border:0; border-radius:10px; cursor:pointer;
    color:#0f1419; font-weight:700; background:linear-gradient(135deg,var(--amber),#ffd277)}
  .gatebox .grem{display:flex; gap:8px; align-items:center; color:var(--muted); font-size:13px}
  .gatebox .gerr{color:var(--red); font-size:13px; min-height:16px; text-align:center}
</style>
</head>
<body>
  <div id="gate" class="gate">
    <form id="gateform" class="gatebox">
      <div class="glock">🔒</div>
      <div class="gtitle">todo.md</div>
      <input id="pass" type="password" placeholder="passphrase" autocomplete="current-password">
      <button type="submit">Unlock</button>
      <label class="grem"><input type="checkbox" id="remember" checked> remember on this device</label>
      <div id="err" class="gerr"></div>
    </form>
  </div>
  <header>
    <span class="badge">todo.md</span>
    <div><div class="date" id="date">—</div></div>
    <div class="worksite" id="worksite"></div>
    <div class="clock"><div class="t" id="clock">--:--</div><div class="d" id="cdate"></div></div>
  </header>
  <div class="grid" id="grid"></div>
  <div id="meqbar"></div>
  <footer>
    <span id="overall">0 / 0 done</span>
    <span class="progress"><i id="bar"></i></span>
    <span id="gen"></span>
    <button id="reset">Reset ticks</button>
    <button id="sync" hidden>⤴ Sync progress</button>
    <button id="lock" hidden>Lock</button>
  </footer>
<script>

const ACCENTS=[
  [/TODAY/i,'var(--amber)'],[/NEXT/i,'var(--blue)'],[/DUE|RISK/i,'var(--red)'],
  [/TO.?DO/i,'var(--green)'],[/MEQ|EXAM/i,'var(--purple)']
];
function accent(name){for(const[re,c]of ACCENTS)if(re.test(name))return c;return 'var(--blue)';}
function hash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return 'k'+(h>>>0).toString(36);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  s=esc(s);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/~~([^~]+)~~/g,'<del>$1</del>');
  s=s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g,'$1<em>$2</em>');
  return s;
}
function parse(raw){
  const lines=raw.replace(/\r/g,'').split('\n');
  let title='',worksite='',sections=[],i=0;
  for(;i<lines.length;i++){const m=lines[i].match(/^#\s+(.*)/);if(m){title=m[1].trim();i++;break;}}
  let cur=null;
  for(;i<lines.length;i++){
    const ln=lines[i], h2=ln.match(/^##\s+(.*)/);
    if(h2){const n=h2[1].trim();
      if(/^worksite$/i.test(n)){cur={ws:true};}
      else{cur={name:n,lines:[]};sections.push(cur);}
      continue;}
    if(cur&&cur.ws){if(ln.trim())worksite+=(worksite?' ':'')+ln.trim();continue;}
    if(cur)cur.lines.push(ln);
  }
  return{title,worksite,sections};
}
function renderTable(rows){
  let out='<table>';
  rows=rows.filter(r=>!/^\s*\|[\s|:-]+\|\s*$/.test(r));
  rows.forEach((r,idx)=>{
    const cells=r.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
    const tag=idx===0?'th':'td';
    out+='<tr>'+cells.map(c=>`<${tag}>${inline(c)}</${tag}>`).join('')+'</tr>';
    if(idx===0)out+='</thead><tbody>';
  });
  return out.replace('<table><tr>','<table><thead><tr>')+'</tbody></table>';
}
function renderCard(sec){
  const acc=accent(sec.name);
  let parts=[],ids=[],j=0,L=sec.lines;
  while(j<L.length){
    let ln=L[j];
    if(!ln.trim()||ln.trim()==='---'){j++;continue;}
    if(/^\s*\|/.test(ln)){let t=[];while(j<L.length&&/^\s*\|/.test(L[j])){t.push(L[j]);j++;}parts.push(renderTable(t));continue;}
    if(/^\s*>/.test(ln)){parts.push('<p class="note">'+inline(ln.replace(/^\s*>\s?/,''))+'</p>');j++;continue;}
    let li=ln.match(/^(\s*)(?:[-*]|\d+\.)\s+(.*)$/);
    if(li){
      let text=li[2],checked=false;
      let cb=text.match(/^\[([ xX])\]\s+(.*)$/);
      if(cb){checked=cb[1].toLowerCase()==='x';text=cb[2];}
      if(/~~/.test(text)||/^\s*(?:✅|❌|☑)/.test(text))checked=true;  // done = struck, or leading status emoji (not a ✅ mid-text)
      const key=hash(sec.name+'|'+text);ids.push(key);
      parts.push(`<label class="item${checked?' done':''}"><input type="checkbox" data-key="${key}"${checked?' checked':''}><span class="txt">${inline(text)}</span></label>`);
      j++;continue;
    }
    let sl=ln.match(/^\*\*(.+?):?\*\*\s*$/);
    if(sl){parts.push('<h3 class="sub">'+inline(sl[1])+'</h3>');j++;continue;}
    parts.push('<p>'+inline(ln.trim())+'</p>');j++;
  }
  const card=document.createElement('section');
  card.className='card';card.style.setProperty('--accent',acc);
  card.innerHTML=`<h2>${esc(sec.name)}<span class="count" data-count>${ids.length?'0/'+ids.length:''}</span></h2>`+parts.join('');
  return card;
}
function renderMeqBar(sec){
  const text=sec.lines.filter(l=>l.trim()).join(' ');
  let html='<div class="meqtitle">'+esc(sec.name)+'</div>';
  const cd=text.match(/\*\*(\d+\s*days?)\*\*\s*until\s*([^.]+)/i);
  if(cd)html+=`<div class="cd"><span class="n">${esc(cd[1])}</span><span class="u">until ${inline(cd[2].trim())}</span></div>`;
  const comp=text.match(/components:\s*([^.]+)/i);
  if(comp){const chips=comp[1].split('·').map(c=>c.trim()).filter(Boolean);
    html+='<div class="chips">'+chips.map(c=>`<span class="chip">${inline(c)}</span>`).join('')+'</div>';}
  const tw=sec.lines.find(l=>/^\s*\*\*This week/i.test(l));
  if(tw){const m=tw.match(/^\s*\*\*(.+?):?\*\*\s*(.*)$/);
    html+=`<div class="thisweek"><b>${inline(m?m[1]:'This week')}:</b> ${inline(m?m[2]:'')}</div>`;}
  const bar=document.createElement('div');bar.className='meqbar';bar.innerHTML=html;return bar;
}
function counts(){
  let tot=0,done=0;
  document.querySelectorAll('.card').forEach(c=>{
    const boxes=c.querySelectorAll('input[type=checkbox]');
    if(!boxes.length)return;
    let d=0;boxes.forEach(b=>{if(b.checked)d++;});
    tot+=boxes.length;done+=d;
    const badge=c.querySelector('[data-count]');if(badge)badge.textContent=d+'/'+boxes.length;
  });
  document.getElementById('overall').textContent=done+' / '+tot+' done';
  document.getElementById('bar').style.width=(tot?Math.round(done/tot*100):0)+'%';
}
function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  document.getElementById('cdate').textContent=d.toLocaleDateString([], {weekday:'short',day:'numeric',month:'short'});
}
function boot(MD,GEN){
  const doc=parse(MD);
  document.getElementById('date').textContent=doc.title||'Today';
  document.getElementById('worksite').innerHTML=doc.worksite?('<b>Worksite</b> · '+inline(doc.worksite)):'';
  document.getElementById('gen').textContent='built '+GEN;
  const NS='todoboard:'+(doc.title||'day');
  let store={};try{store=JSON.parse(localStorage.getItem(NS)||'{}');}catch(e){}
  const grid=document.getElementById('grid');
  doc.sections.forEach(s=>{
    if(/MEQ|EXAM/i.test(s.name))document.getElementById('meqbar').appendChild(renderMeqBar(s));
    else grid.appendChild(renderCard(s));
  });
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    const k=cb.dataset.key;
    if(k in store)cb.checked=store[k];
    cb.closest('.item').classList.toggle('done',cb.checked);
    cb.addEventListener('change',()=>{
      store[k]=cb.checked;localStorage.setItem(NS,JSON.stringify(store));
      cb.closest('.item').classList.toggle('done',cb.checked);counts();
    });
  });
  counts();
  const rb=document.getElementById('reset');
  if(rb)rb.addEventListener('click',()=>{localStorage.removeItem(NS);location.reload();});
  return doc;
}

const GEN="fri 24 jul 2026, 6:13am";
const PKEY='todoboard:pass';
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pass){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(SECRET.salt),iterations:SECRET.iter,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(SECRET.iv)},key,b64d(SECRET.ct));
  return new TextDecoder().decode(pt);
}
function reveal(text){
  let obj; try{obj=JSON.parse(text);}catch(e){obj={md:text,sync:null};}
  if(typeof obj!=='object'||obj===null||!('md' in obj))obj={md:text,sync:null};
  document.getElementById('gate').remove();
  const doc=boot(obj.md,GEN);
  tick();setInterval(tick,1000);
  const lk=document.getElementById('lock');
  lk.hidden=false;lk.addEventListener('click',()=>{localStorage.removeItem(PKEY);location.reload();});
  if(obj.sync&&obj.sync.url)wireSync(obj.sync,doc);
  setTimeout(()=>location.reload(),300000);
}
function wireSync(sync,doc){
  const btn=document.getElementById('sync');btn.hidden=false;
  const SKEY='todoboard:synced:'+(doc.title||'day');   // what we last reported done
  btn.addEventListener('click',async()=>{
    const doneNow=new Set();
    document.querySelectorAll('.card .item').forEach(it=>{
      if(it.querySelector('input').checked)doneNow.add(it.querySelector('.txt').textContent.trim());
    });
    let prev=[];try{prev=JSON.parse(localStorage.getItem(SKEY)||'[]');}catch(e){}
    const prevSet=new Set(prev);
    const done=[...doneNow].filter(t=>!prevSet.has(t));   // newly ticked since last sync
    const undone=prev.filter(t=>!doneNow.has(t));         // previously reported, now un-ticked
    const orig='⤴ Sync progress';
    if(!done.length&&!undone.length){
      btn.textContent='Nothing new';setTimeout(()=>{btn.textContent=orig;},2500);return;
    }
    const now=new Date();
    const ts=now.toLocaleDateString([], {weekday:'short',day:'numeric',month:'short'})+', '
            +now.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    btn.disabled=true;btn.textContent='Syncing…';
    try{
      const r=await fetch(sync.url,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({key:sync.key,date:doc.title,ts,done,undone})});
      if(r.ok){localStorage.setItem(SKEY,JSON.stringify([...doneNow]));btn.textContent='Synced ✓';}
      else btn.textContent='Sync failed';
    }catch(e){btn.textContent='Sync failed';}
    setTimeout(()=>{btn.textContent=orig;btn.disabled=false;},4000);
  });
}
async function attempt(pass){try{reveal(await unlock(pass));return true;}catch(e){return false;}}
window.addEventListener('DOMContentLoaded',async()=>{
  const saved=localStorage.getItem(PKEY);
  if(saved&&await attempt(saved))return;
  const f=document.getElementById('gateform'),inp=document.getElementById('pass'),err=document.getElementById('err');
  f.addEventListener('submit',async e=>{
    e.preventDefault();err.textContent='';
    if(await attempt(inp.value)){if(document.getElementById('remember').checked)localStorage.setItem(PKEY,inp.value);}
    else{err.textContent='Wrong passphrase';inp.select();}
  });
  inp.focus();
});
